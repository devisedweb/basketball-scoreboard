<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Basketball Scoreboard</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="container">
      <div>
        <h2>HOME</h2>
        <h3 id="home-score">0</h3>
        <button id="add-one-home-score">+1</button>
        <button id="add-two-home-score">+2</button>
        <button id="add-three-home-score">+3</button>
      </div>

      <div>
        <h2>GUEST</h2>
        <h3 id="guest-score">0</h3>
        <button id="add-one-guest-score">+1</button>
        <button id="add-two-guest-score">+2</button>
        <button id="add-three-guest-score">+3</button>
      </div>
    </div>
  </body>
</html>
